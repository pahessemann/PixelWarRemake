openapi: 3.0.3
info:
  title: PixelWarRemake API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Server status
  /palette:
    get:
      summary: Available color palette
      responses:
        "200":
          description: Palette entries
  /register:
    post:
      summary: Create a local account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Account created; returns either a session token or email verification status
        "400":
          description: Invalid input
        "409":
          description: Username or email already used
  /verify-email:
    get:
      summary: Verify an email address with a registration token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid or expired token
  /login:
    post:
      summary: Login with username or email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                  description: Username or email
                password:
                  type: string
      responses:
        "200":
          description: Session token returned
        "401":
          description: Invalid credentials
        "403":
          description: Email address is not verified
        "429":
          description: Login rate limited or temporarily locked
  /map:
    get:
      summary: Read the pixel map or a diff
      parameters:
        - name: since
          in: query
          schema:
            type: integer
            format: int64
          description: Return a diff when the sequence is still available
      responses:
        "200":
          description: Full map or diff payload
  /events:
    get:
      summary: Server-Sent Events stream for pixel map diffs
      parameters:
        - name: since
          in: query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: SSE event named pixels containing map diff JSON
  /history:
    get:
      summary: Latest placed pixels with username and timestamp
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Recent pixel history
  /pixel:
    post:
      summary: Place one pixel if the cooldown allows it
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x, y, color]
              properties:
                x:
                  type: integer
                y:
                  type: integer
                color:
                  type: integer
                  minimum: 0
                  maximum: 15
      responses:
        "200":
          description: Pixel placed
        "401":
          description: Missing or invalid token
        "403":
          description: Verified local account required
        "429":
          description: Cooldown still active
  /cooldown:
    get:
      summary: Read remaining cooldown for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cooldown status
        "401":
          description: Missing or invalid token
        "403":
          description: Verified local account required
  /admin/summary:
    get:
      summary: Admin dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Server, map and rule summary
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/users:
    get:
      summary: Admin local-account user list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/audit:
    get:
      summary: List recent admin audit entries
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 300
      responses:
        "200":
          description: Audit entries
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/users/reset-cooldown:
    post:
      summary: Reset one user's pixel cooldown window
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Cooldown reset
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: User not found
  /admin/backups:
    get:
      summary: List map backups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Backup list
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/backups/create:
    post:
      summary: Create a map backup
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                screenshot:
                  type: boolean
      responses:
        "200":
          description: Backup created
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/backups/rollback:
    post:
      summary: Restore a map backup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Backup restored after creating a safety backup
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: Backup not found
  /admin/map/reset:
    post:
      summary: Reset the map after creating a final backup and screenshot
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: integer
                  minimum: 0
                  maximum: 15
      responses:
        "200":
          description: Map reset
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/backups/screenshot:
    get:
      summary: Download a backup screenshot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: BMP screenshot
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: Screenshot not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
