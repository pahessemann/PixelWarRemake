openapi: 3.0.3
info:
  title: PixelWarRemake API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Server status
  /palette:
    get:
      summary: Available color palette
      responses:
        "200":
          description: Palette entries
  /register:
    post:
      summary: Disabled local account creation
      responses:
        "410":
          description: Discord OAuth is required
  /login:
    post:
      summary: Disabled password login
      responses:
        "410":
          description: Discord OAuth is required
  /auth/discord/status:
    get:
      summary: Discord OAuth configuration status
      responses:
        "200":
          description: Whether Discord login is configured
  /auth/discord:
    get:
      summary: Redirect to Discord OAuth2 authorization
      responses:
        "302":
          description: Redirect to Discord
  /auth/discord/callback:
    get:
      summary: Discord OAuth2 callback
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: HTML page that stores the PixelWar session token and redirects home
  /map:
    get:
      summary: Read the pixel map or a diff
      parameters:
        - name: since
          in: query
          schema:
            type: integer
            format: int64
          description: Return a diff when the sequence is still available
      responses:
        "200":
          description: Full map or diff payload
  /pixel:
    post:
      summary: Place one pixel if the cooldown allows it
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x, y, color]
              properties:
                x:
                  type: integer
                y:
                  type: integer
                color:
                  type: integer
                  minimum: 0
                  maximum: 15
      responses:
        "200":
          description: Pixel placed
        "401":
          description: Missing or invalid token
        "403":
          description: Discord OAuth account required
        "429":
          description: Cooldown still active
  /cooldown:
    get:
      summary: Read remaining cooldown for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cooldown status
        "401":
          description: Missing or invalid token
        "403":
          description: Discord OAuth account required
  /admin/summary:
    get:
      summary: Admin dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Server, map and rule summary
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/users:
    get:
      summary: Admin Discord user list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/users/reset-cooldown:
    post:
      summary: Reset one user's pixel cooldown window
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Cooldown reset
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: User not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
