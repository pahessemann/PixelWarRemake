openapi: 3.0.3
info:
  title: PixelWarRemake API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Server status
  /palette:
    get:
      summary: Available color palette
      responses:
        "200":
          description: Palette entries
  /register:
    post:
      summary: Disabled local account creation
      responses:
        "410":
          description: Verified email authentication is required
  /login:
    post:
      summary: Disabled password login
      responses:
        "410":
          description: Verified email authentication is required
  /auth/status:
    get:
      summary: Verified OIDC configuration status
      responses:
        "200":
          description: Whether verified OIDC login is configured
  /auth/login:
    get:
      summary: Redirect to the configured OpenID Connect authorization endpoint
      responses:
        "302":
          description: Redirect to the identity provider
  /auth/callback:
    get:
      summary: OpenID Connect callback
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: HTML page that stores the PixelWar session token after email_verified is true
  /map:
    get:
      summary: Read the pixel map or a diff
      parameters:
        - name: since
          in: query
          schema:
            type: integer
            format: int64
          description: Return a diff when the sequence is still available
      responses:
        "200":
          description: Full map or diff payload
  /pixel:
    post:
      summary: Place one pixel if the cooldown allows it
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x, y, color]
              properties:
                x:
                  type: integer
                y:
                  type: integer
                color:
                  type: integer
                  minimum: 0
                  maximum: 15
      responses:
        "200":
          description: Pixel placed
        "401":
          description: Missing or invalid token
        "403":
          description: Verified email account required
        "429":
          description: Cooldown still active
  /cooldown:
    get:
      summary: Read remaining cooldown for authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cooldown status
        "401":
          description: Missing or invalid token
        "403":
          description: Verified email account required
  /admin/summary:
    get:
      summary: Admin dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Server, map and rule summary
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/users:
    get:
      summary: Admin verified-account user list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/users/reset-cooldown:
    post:
      summary: Reset one user's pixel cooldown window
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: integer
                  format: int64
      responses:
        "200":
          description: Cooldown reset
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: User not found
  /admin/backups:
    get:
      summary: List map backups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Backup list
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/backups/create:
    post:
      summary: Create a map backup
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                screenshot:
                  type: boolean
      responses:
        "200":
          description: Backup created
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/backups/rollback:
    post:
      summary: Restore a map backup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Backup restored after creating a safety backup
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: Backup not found
  /admin/map/reset:
    post:
      summary: Reset the map after creating a final backup and screenshot
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                color:
                  type: integer
                  minimum: 0
                  maximum: 15
      responses:
        "200":
          description: Map reset
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
  /admin/backups/screenshot:
    get:
      summary: Download a backup screenshot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: BMP screenshot
        "401":
          description: Missing or invalid token
        "403":
          description: Authenticated user is not the configured admin
        "404":
          description: Screenshot not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
